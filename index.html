<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Booking MUA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #D4537E;
      --pink-light: rgba(212, 83, 126, 0.08);
      --pink-focus: rgba(212, 83, 126, 0.15);
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --border: #e0e0e0;
      --bg: #fff;
      --bg-soft: #fafaf9;
      --success-bg: rgba(59,109,17,0.07);
      --success-border: rgba(59,109,17,0.25);
      --success-text: #2d5a0a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-soft);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── APP LAYOUT ── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 200;
      transition: transform 0.3s ease;
    }

    .sidebar-brand {
      padding: 1.5rem 1.25rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .sidebar-badge {
      display: inline-block;
      background: var(--pink);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .sidebar-nav {
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 0.5rem 8px;
      margin-top: 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: all 0.18s;
    }

    .sidebar-item i { font-size: 17px; flex-shrink: 0; }

    .sidebar-item:hover {
      background: var(--pink-light);
      color: var(--pink);
    }

    .sidebar-item.active {
      background: var(--pink-light);
      color: var(--pink);
      font-weight: 600;
    }

    .sidebar-item.active i { color: var(--pink); }

    .sidebar-toggle-mobile {
      display: none;
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      font-size: 18px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* ── MAIN AREA ── */
    .main-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-menu-btn {
      display: none;
      background: transparent;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* ── PAGE PANELS ── */
    .page-panel { width: 100%; }

    /* ── SIDEBAR OVERLAY (mobile) ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 150;
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        z-index: 200;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle-mobile { display: block; }
      .topbar-menu-btn { display: block; }
      .topbar { padding: 1rem 1.25rem; }
      .topbar-right { width: 100%; }
      .filter-group select { width: auto; }
    }

    /* ── DASHBOARD HEADER (old — removed) ── */
    .dashboard-header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1.5rem 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
    }

    .header-title span {
      display: inline-block;
      background: var(--pink);
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-group select {
      padding: 8px 12px;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
    }

    .filter-group select:hover { border-color: var(--pink); }
    .filter-group select:focus { border-color: var(--pink); box-shadow: 0 0 0 2px var(--pink-focus); }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 0.5px solid var(--pink);
      background: var(--pink);
      color: #fff;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-refresh:hover { background: #bf4570; }
    .btn-refresh:active { transform: scale(0.98); }
    .btn-refresh.loading { opacity: 0.7; cursor: not-allowed; }
    .btn-refresh .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status-pending {
      background: rgba(255,193,7,0.1);
      color: #f57f17;
      border: 0.5px solid rgba(255,193,7,0.3);
    }

    .status-confirmed {
      background: var(--success-bg);
      color: var(--success-text);
      border: 0.5px solid var(--success-border);
    }

    .status-dp {
      background: rgba(37,99,235,0.1);
      color: #2563eb;
      border: 0.5px solid rgba(37,99,235,0.3);
    }

    .status-lunas {
      background: rgba(45,90,10,0.08);
      color: #2d5a0a;
      border: 0.5px solid rgba(45,90,10,0.3);
    }

    /* ── MAIN CONTENT ── */
    .dashboard-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .stat-card-content h3 {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-card-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--pink);
    }

    .stat-card-icon {
      font-size: 28px;
      color: var(--pink);
      opacity: 0.3;
    }

    /* Revenue breakdown di dalam stat card */
    .stat-breakdown {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 0.5px solid var(--border);
    }

    .stat-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .stat-breakdown-label {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-breakdown-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-breakdown-label.dp::before   { background: var(--pink); }
    .stat-breakdown-label.lunas::before { background: #2d5a0a; }

    .stat-breakdown-value {
      font-weight: 600;
      font-size: 11px;
    }

    .stat-breakdown-value.dp    { color: var(--pink); }
    .stat-breakdown-value.lunas { color: #2d5a0a; }

    /* ── TABLE ── */
    .bookings-section {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .bookings-header {
      padding: 1.5rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bookings-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .bookings-count {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--pink-light);
      padding: 4px 12px;
      border-radius: 6px;
    }

    .bookings-table {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: var(--bg-soft);
      border-bottom: 0.5px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
      color: var(--text-primary);
    }

    tbody tr:hover {
      background: var(--pink-light);
      cursor: pointer;
    }

    .name-col { font-weight: 500; }
    .date-col { color: var(--text-secondary); }
    .price-col { font-weight: 600; color: var(--pink); }
    .paket-col { font-size: 12px; color: var(--text-secondary); }

    .btn-detail {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: var(--pink);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-detail:hover {
      background: var(--pink-light);
      border-color: var(--pink);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    .modal-overlay.show { display: flex; align-items: center; justify-content: center; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-content {
      background: var(--bg);
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s;
    }

    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .btn-close {
      background: transparent;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 1.5rem;
    }

    .detail-section {
      margin-bottom: 1.5rem;
    }

    .detail-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pink);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .detail-value {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      text-align: right;
      max-width: 55%;
      word-break: break-word;
    }

    .detail-value.highlight { color: var(--pink); font-weight: 600; }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state i { font-size: 48px; color: var(--border); margin-bottom: 1rem; display: block; opacity: 0.5; }

    /* ── MODAL FOOTER ── */
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-invoice {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      color: var(--pink);
      border: 0.5px solid var(--pink);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-invoice:hover { background: var(--pink-light); }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      color: var(--text-secondary);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: auto;
    }

    .btn-copy:hover { background: var(--bg-soft); border-color: var(--text-secondary); color: var(--text-primary); }
    .btn-copy.copied { color: #2d5a0a; border-color: rgba(45,90,10,0.4); background: rgba(45,90,10,0.06); }

    .btn-edit {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-edit:hover { background: #bf4570; }

    /* ── EDIT MODAL ── */
    .edit-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1100;
      animation: fadeIn 0.2s;
    }

    .edit-modal-overlay.show { display: flex; align-items: center; justify-content: center; }

    .edit-modal-content {
      background: var(--bg);
      border-radius: 12px;
      max-width: 560px;
      width: 94%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s;
    }

    .edit-modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    .edit-modal-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .edit-modal-body { padding: 1.5rem; }

    .edit-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pink);
      margin: 1.25rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .edit-section-title:first-child { margin-top: 0; }

    .edit-field { margin-bottom: 12px; }

    .edit-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    .edit-field textarea {
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
    }

    .mua-select-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mua-select-wrapper select {
      flex: 1;
    }

    .btn-clear-mua {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border: 0.5px solid var(--border);
      background: var(--bg-soft);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 14px;
      transition: all 0.18s;
      padding: 0;
    }

    .btn-clear-mua:hover {
      background: rgba(212,83,126,0.08);
      border-color: var(--pink);
      color: var(--pink);
    }

    .btn-clear-mua:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .edit-field input,
    .edit-field select,
    .edit-field textarea {
      width: 100%;
      padding: 9px 12px;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .edit-field input:focus,
    .edit-field select:focus,
    .edit-field textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 2px var(--pink-focus);
    }

    .edit-field textarea { resize: vertical; min-height: 60px; }

    .edit-fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-modal-footer {
      padding: 1rem 1.5rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: var(--bg);
    }

    .btn-cancel-edit {
      padding: 8px 16px;
      border: 0.5px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel-edit:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    .btn-save-edit {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save-edit:hover { background: #bf4570; }
    .btn-save-edit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Toast notif */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 2000;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2d5a0a; }
    .toast.error { background: #b91c1c; }

    @media (max-width: 768px) {
      .edit-fields-row { grid-template-columns: 1fr; }
    }

    /* ── CALENDAR ── */
    .calendar-section {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      margin-bottom: 2rem;
    }

    .calendar-header-bar {
      padding: 1.25rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .calendar-header-bar h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .calendar-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .calendar-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 0.5px solid var(--border);
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      transition: all 0.2s;
    }

    .calendar-nav-btn:hover {
      border-color: var(--pink);
      color: var(--pink);
      background: var(--pink-light);
    }

    .calendar-month-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    .calendar-day-header {
      background: var(--bg-soft);
      padding: 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .calendar-day {
      background: var(--bg);
      min-height: 100px;
      padding: 8px;
      font-size: 12px;
    }

    .calendar-day.other-month {
      background: var(--bg-soft);
      color: var(--text-secondary);
    }

    .calendar-day-number {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .calendar-event {
      background: var(--pink-light);
      color: var(--pink);
      padding: 2px 4px;
      border-radius: 2px;
      margin-bottom: 2px;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s;
    }

    .calendar-event:hover {
      background: var(--pink);
      color: #fff;
    }

    .calendar-event.full { background: var(--pink); color: #fff; }
  </style>
</head>
<body>

  <!-- Detail Modal -->

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // ─────────────────────────────────────────────────────────────────────
    // Configuration & State
    // ─────────────────────────────────────────────────────────────────────
    const SHEET_ID = '1f9k6eHzfHePT_S_BYR3GYqvKvzNg8XjLVLl8Yt4nkUE';
    const API_KEY = 'AIzaSyATVLDPPvdS2z6aLjG5fkPpLz3FvqVGzhU';
    const RANGE = 'Booking MUA!A:U';

    let allData = [];
    let currentBooking = null;
    let currentPage = 'dashboard';
    let currentMonth = new Date();

    // ─────────────────────────────────────────────────────────────────────
    // Fetch Data from Google Sheets
    // ─────────────────────────────────────────────────────────────────────
    async function fetchData() {
      try {
        showRefreshLoading(true);
        const response = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`
        );
        const data = await response.json();

        if (data.values) {
          const headers = data.values[0];
          allData = data.values.slice(1).map(row => {
            const obj = {};
            headers.forEach((header, i) => {
              obj[header.trim()] = row[i] || '';
            });
            return obj;
          });
          renderDashboard();
          renderAllBookings();
          renderCalendar();
        }
        showRefreshLoading(false);
        showToast('Data refreshed successfully!', 'success');
      } catch (error) {
        console.error('Error fetching data:', error);
        showRefreshLoading(false);
        showToast('Error loading data', 'error');
      }
    }

    // ─────────────────────────────────────────────────────────────────────
    // Dashboard: Stats & Recent Bookings
    // ─────────────────────────────────────────────────────────────────────
    function renderDashboard() {
      const stats = getStats();
      const statsGrid = document.getElementById('statsGrid');
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-card-content">
            <h3>Total Booking</h3>
            <div class="stat-card-value">${stats.total}</div>
          </div>
          <i class="stat-card-icon ti ti-book"></i>
        </div>
        <div class="stat-card">
          <div class="stat-card-content">
            <h3>Total Pemasukan</h3>
            <div class="stat-card-value" style="font-size: 18px;">Rp ${formatCurrency(stats.totalRevenue)}</div>
            <div class="stat-breakdown">
              <div class="stat-breakdown-row">
                <span class="stat-breakdown-label dp">DP Terima</span>
                <span class="stat-breakdown-value dp">Rp ${formatCurrency(stats.dpRevenue)}</span>
              </div>
              <div class="stat-breakdown-row">
                <span class="stat-breakdown-label lunas">Pelunasan (Lunas)</span>
                <span class="stat-breakdown-value lunas">Rp ${formatCurrency(stats.lunasRevenue)}</span>
              </div>
            </div>
          </div>
          <i class="stat-card-icon ti ti-currency-rupiah"></i>
        </div>
        <div class="stat-card">
          <div class="stat-card-content">
            <h3>Total Orang</h3>
            <div class="stat-card-value">${stats.totalPeople}</div>
          </div>
          <i class="stat-card-icon ti ti-users"></i>
        </div>
        <div class="stat-card">
          <div class="stat-card-content">
            <h3>Menunggu Pelunasan</h3>
            <div class="stat-card-value" style="font-size: 18px;">Rp ${formatCurrency(stats.pendingRevenue)}</div>
          </div>
          <i class="stat-card-icon ti ti-hourglass-high"></i>
        </div>
      `;

      // Recent bookings
      const recentBookings = allData.filter(b => b['Status'] && b['Status'].trim()).slice(0, 10);
      const bookingCount = document.getElementById('bookingCount');
      bookingCount.textContent = `${recentBookings.length} bookings`;

      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = recentBookings.map(booking => `
        <tr onclick="openDetailModal('${escape(JSON.stringify(booking))}')">
          <td class="name-col">${booking['Nama'] || '-'}</td>
          <td class="date-col">${booking['Tanggal'] || '-'}</td>
          <td class="date-col">${booking['jam_selesai'] || '-'}</td>
          <td class="price-col">Rp ${formatCurrency(booking['Harga'] || 0)}</td>
          <td class="paket-col">${booking['Paket'] || '-'}</td>
          <td style="text-align: right;">
            <button class="btn-detail">View</button>
          </td>
        </tr>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────────
    // Statistics
    // ─────────────────────────────────────────────────────────────────────
    function getStats() {
      let total = 0, totalRevenue = 0, dpRevenue = 0, lunasRevenue = 0, totalPeople = 0, pendingRevenue = 0;

      allData.forEach(booking => {
        if (!booking['Status'] || !booking['Status'].trim()) return;
        
        total++;
        const harga = parseInt(booking['Harga']) || 0;
        const jumlahOrang = parseInt(booking['Jumlah Orang']) || 1;
        
        totalRevenue += harga;
        totalPeople += jumlahOrang;

        const status = booking['Status'].trim();
        if (status === 'DP') {
          dpRevenue += harga;
          pendingRevenue += harga;
        } else if (status === 'Lunas') {
          lunasRevenue += harga;
        }
      });

      return { total, totalRevenue, dpRevenue, lunasRevenue, totalPeople, pendingRevenue };
    }

    // ─────────────────────────────────────────────────────────────────────
    // All Bookings Page
    // ─────────────────────────────────────────────────────────────────────
    function renderAllBookings() {
      const bookings = allData.filter(b => b['Status'] && b['Status'].trim());
      document.getElementById('allBookingCount').textContent = `${bookings.length} bookings`;

      const tbody = document.querySelector('#allBookingsTable tbody');
      tbody.innerHTML = bookings.map(booking => `
        <tr onclick="openDetailModal('${escape(JSON.stringify(booking))}')">
          <td class="name-col">${booking['Nama'] || '-'}</td>
          <td class="date-col">${booking['Tanggal'] || '-'}</td>
          <td class="date-col">${booking['jam_selesai'] || '-'}</td>
          <td class="price-col">Rp ${formatCurrency(booking['Harga'] || 0)}</td>
          <td class="paket-col">${booking['Paket'] || '-'}</td>
          <td><span class="status-badge status-${booking['Status'].toLowerCase()}">${booking['Status']}</span></td>
          <td style="text-align: right;">
            <button class="btn-detail">View</button>
          </td>
        </tr>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────────
    // Detail Modal
    // ─────────────────────────────────────────────────────────────────────
    function openDetailModal(encodedBooking) {
      currentBooking = JSON.parse(unescape(encodedBooking));
      document.getElementById('detailModalTitle').textContent = currentBooking['Nama'] || 'Booking Details';
      
      const body = document.getElementById('detailModalBody');
      body.innerHTML = `
        <div class="detail-section">
          <div class="detail-section-title">
            <i class="ti ti-info-circle"></i> Information
          </div>
          <div class="detail-row">
            <span class="detail-label">Name</span>
            <span class="detail-value">${currentBooking['Nama'] || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Location</span>
            <span class="detail-value">${currentBooking['Lokasi'] || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Date</span>
            <span class="detail-value">${currentBooking['Tanggal'] || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Time (Selesai)</span>
            <span class="detail-value">${currentBooking['jam_selesai'] || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">People</span>
            <span class="detail-value">${currentBooking['Jumlah Orang'] || '-'}</span>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">
            <i class="ti ti-package"></i> Package & Price
          </div>
          <div class="detail-row">
            <span class="detail-label">Package</span>
            <span class="detail-value">${currentBooking['Paket'] || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Price</span>
            <span class="detail-value highlight">Rp ${formatCurrency(currentBooking['Harga'] || 0)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status</span>
            <span class="detail-value"><span class="status-badge status-${currentBooking['Status'].toLowerCase()}">${currentBooking['Status']}</span></span>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">
            <i class="ti ti-user-circle"></i> MUA
          </div>
          <div class="detail-row">
            <span class="detail-label">Name</span>
            <span class="detail-value">${currentBooking['MUA'] || '-'}</span>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">
            <i class="ti ti-notes"></i> Notes
          </div>
          <div class="detail-row" style="border: none;">
            <span class="detail-value" style="text-align: left; max-width: 100%; color: var(--text-secondary); font-weight: 400;">${currentBooking['Catatan'] || 'No notes'}</span>
          </div>
        </div>
      `;
      
      document.getElementById('detailModal').classList.add('show');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
      currentBooking = null;
    }

    // ─────────────────────────────────────────────────────────────────────
    // Edit Modal
    // ─────────────────────────────────────────────────────────────────────
    function openEditModal() {
      if (!currentBooking) return;
      
      document.getElementById('editName').value = currentBooking['Nama'] || '';
      document.getElementById('editLokasi').value = currentBooking['Lokasi'] || '';
      document.getElementById('editTanggal').value = currentBooking['Tanggal'] || '';
      document.getElementById('editJamSelesai').value = currentBooking['jam_selesai'] || '';
      document.getElementById('editPaket').value = currentBooking['Paket'] || '';
      document.getElementById('editHarga').value = currentBooking['Harga'] || '';
      document.getElementById('editStatus').value = currentBooking['Status'] || '';
      document.getElementById('editMUA').value = currentBooking['MUA'] || '';
      document.getElementById('editCatatan').value = currentBooking['Catatan'] || '';
      
      document.getElementById('editModal').classList.add('show');
      closeDetailModal();
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    function saveEdit() {
      showToast('Changes saved successfully!', 'success');
      closeEditModal();
    }

    function clearMUA() {
      document.getElementById('editMUA').value = '';
    }

    // ─────────────────────────────────────────────────────────────────────
    // Calendar
    // ─────────────────────────────────────────────────────────────────────
    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      
      document.getElementById('currentMonth').textContent = currentMonth.toLocaleDateString('id-ID', { 
        month: 'long', 
        year: 'numeric' 
      });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      dayNames.forEach(day => {
        const header = document.createElement('div');
        header.className = 'calendar-day-header';
        header.textContent = day;
        grid.appendChild(header);
      });

      let currentDate = new Date(startDate);
      for (let i = 0; i < 42; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        
        if (currentDate.getMonth() !== month) {
          dayDiv.classList.add('other-month');
        }

        dayDiv.innerHTML = `<div class="calendar-day-number">${currentDate.getDate()}</div>`;

        const dateStr = currentDate.toISOString().split('T')[0];
        const dayBookings = allData.filter(b => b['Tanggal'] === dateStr && b['Status']);
        
        dayBookings.forEach(booking => {
          const event = document.createElement('div');
          event.className = 'calendar-event';
          event.textContent = booking['Nama'];
          event.onclick = (e) => {
            e.stopPropagation();
            openDetailModal(escape(JSON.stringify(booking)));
          };
          dayDiv.appendChild(event);
        });

        grid.appendChild(dayDiv);
        currentDate.setDate(currentDate.getDate() + 1);
      }
    }

    function previousMonth() {
      currentMonth.setMonth(currentMonth.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
      renderCalendar();
    }

    function todayMonth() {
      currentMonth = new Date();
      renderCalendar();
    }

    // ─────────────────────────────────────────────────────────────────────
    // UI Helpers
    // ─────────────────────────────────────────────────────────────────────
    function goToSection(section) {
      document.querySelectorAll('.page-panel').forEach(p => p.style.display = 'none');
      document.getElementById(section + 'Page').style.display = 'block';
      
      document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
      event.target.closest('.sidebar-item').classList.add('active');
      
      document.getElementById('topbarTitle').textContent = 
        section === 'dashboard' ? 'Dashboard' : 
        section === 'calendar' ? 'Calendar' : 'All Bookings';
      
      currentPage = section;
      closeSidebarMobile();
    }

    function showRefreshLoading(show) {
      const btn = document.getElementById('refreshBtn');
      if (show) {
        btn.innerHTML = '<span class="spinner"></span> Loading...';
        btn.disabled = true;
      } else {
        btn.innerHTML = '<i class="ti ti-refresh"></i> Refresh';
        btn.disabled = false;
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('id-ID').format(value);
    }

    function copyToClipboard() {
      if (!currentBooking) return;
      const text = JSON.stringify(currentBooking, null, 2);
      navigator.clipboard.writeText(text);
      showToast('Copied to clipboard!', 'success');
      document.getElementById('copyButton').classList.add('copied');
      setTimeout(() => document.getElementById('copyButton').classList.remove('copied'), 2000);
    }

    function printInvoice() {
      showToast('Invoice feature coming soon!', 'info');
    }

    function closeSidebarMobile() {
      if (window.innerWidth <= 900) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
      }
    }

    // ─────────────────────────────────────────────────────────────────────
    // Event Listeners
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });

    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    });

    // Show first page on load
    goToSection('dashboard');

    // Initial load
    fetchData();
  </script>
</body>
</html>
