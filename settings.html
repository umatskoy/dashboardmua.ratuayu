<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings – Ratu Ayu MUA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink: #D4537E;
    --pink-light: #fdf0f4;
    --pink-mid: #f7d6e2;
    --text: #1a1a1a;
    --text-secondary: #888;
    --border: #e8e0e4;
    --bg: #faf8f9;
    --white: #ffffff;
    --green: #3dab7a;
    --red: #e05252;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px; display: flex; flex-direction: column; gap: 32px; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-head {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head-left { display: flex; align-items: center; gap: 10px; }
  .card-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--pink-light); display: flex; align-items: center; justify-content: center; }
  .card-icon svg { width: 15px; height: 15px; stroke: var(--pink); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; }
  .badge { font-size: 11.5px; color: var(--text-secondary); background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }

  .btn-add {
    background: transparent; border: 1.5px dashed var(--pink); color: var(--pink);
    padding: 7px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 12.5px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.15s;
  }
  .btn-add:hover { background: var(--pink-light); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg); }
  th { padding: 10px 16px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); text-align: left; border-bottom: 1px solid var(--border); }
  th.th-act { width: 90px; text-align: center; }
  td { padding: 9px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.new-row td { background: #fffbfc; }

  .td-input {
    width: 100%; border: 1px solid transparent; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text);
    padding: 5px 8px; border-radius: 6px; transition: border 0.15s, background 0.15s; outline: none;
  }
  .td-input:hover { border-color: var(--border); background: var(--white); }
  .td-input:focus { border-color: var(--pink); background: var(--white); box-shadow: 0 0 0 3px rgba(212,83,126,0.08); }

  .harga-wrap { display: flex; align-items: center; gap: 4px; }
  .harga-prefix { font-size: 12px; color: var(--text-secondary); }

  .actions { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .btn-icon {
    width: 30px; height: 30px; border: none; background: none; cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .btn-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-save-row { color: var(--green); }
  .btn-save-row:hover { background: #edf8f3; }
  .btn-del-row { color: #ccc; }
  .btn-del-row:hover { color: var(--red); background: #fdf0f0; }
  .btn-edit-row { color: #aaa; }
  .btn-edit-row:hover { background: var(--bg); color: var(--text); }

  /* view mode */
  .td-view { font-size: 13.5px; color: var(--text); }
  .td-harga-view { font-size: 13px; color: var(--text-secondary); }

  .empty-row td { text-align: center; padding: 28px; color: var(--text-secondary); font-size: 13px; font-style: italic; }

  /* status toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 11px 22px; border-radius: 30px; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 9px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--green); color: white; }
  .toast.error { background: var(--red); color: white; }
  .toast svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  .loading-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .loading-overlay.show { opacity: 1; pointer-events: auto; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--pink-mid); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .td-select {
    appearance: auto;
    cursor: pointer;
  }
  .td-role-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
  }
  .td-role-badge.role-mua { background: #fdf0f4; color: var(--pink); border: 1px solid var(--pink-mid); }
  .td-role-badge.role-hair-stylist { background: #f0f4fd; color: #4a6fbf; border: 1px solid #c5d3f0; }
  .td-role-badge.role-hijab-stylist { background: #f0fdf4; color: #2d7a4f; border: 1px solid #b6e8cc; }

  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .main { padding: 20px 12px; }
    .header-title { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div>
      <div class="header-title">Settings — Ratu Ayu MUA</div>
      <div class="header-sub">Kelola paket, add on & tim tanpa ubah kode</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- PAKET -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-left">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        </div>
        <div class="card-title">Paket Make Up</div>
        <span class="badge" id="paket-badge">–</span>
      </div>
      <button class="btn-add" onclick="startAddPaket()">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Paket
      </button>
    </div>
    <table>
      <thead><tr><th>Nama Paket</th><th style="width:190px">Harga</th><th class="th-act">Aksi</th></tr></thead>
      <tbody id="paket-tbody"></tbody>
    </table>
  </div>

  <!-- ADD ON -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-left">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <div class="card-title">Add On</div>
        <span class="badge" id="addon-badge">–</span>
      </div>
      <button class="btn-add" onclick="startAddAddon()">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Add On
      </button>
    </div>
    <table>
      <thead><tr><th>Nama Add On</th><th style="width:190px">Harga</th><th class="th-act">Aksi</th></tr></thead>
      <tbody id="addon-tbody"></tbody>
    </table>
  </div>

  <!-- TIM -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-left">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="card-title">Tim</div>
        <span class="badge" id="tim-badge">–</span>
      </div>
      <button class="btn-add" onclick="startAddTim()">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Anggota
      </button>
    </div>
    <table>
      <thead><tr><th>Nama</th><th style="width:200px">Role</th><th class="th-act">Aksi</th></tr></thead>
      <tbody id="tim-tbody"></tbody>
    </table>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg"></span>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<script>
  const GAS = 'https://script.google.com/macros/s/AKfycbzW4Rs9Uc7psMTYJgKSRXnE_lWb8rKtJ1IxV4z_-D9R5tiZ4OoAYDAsIRxyd1hOc7NSAQ/exec';

  let pakets = [];   // { nama, harga, _rowIndex }
  let addons = [];   // { nama, harga, _rowIndex }
  let timData = [];  // { nama, role, _rowIndex }

  // ── INIT ──
  async function init() {
    load(true);
    await Promise.all([loadPakets(), loadAddons(), loadTim()]);
    load(false);
  }

  async function loadPakets() {
    try {
      const r = await gas('getPakets');
      pakets = r.pakets || [];
      renderPaket();
    } catch(e) { toast('Gagal load paket: ' + e.message, 'error'); }
  }

  async function loadAddons() {
    try {
      const r = await gas('getAddOns');
      addons = r.addons || [];
      renderAddon();
    } catch(e) { toast('Gagal load add on: ' + e.message, 'error'); }
  }

  async function loadTim() {
    try {
      const r = await gas('getTeam');
      timData = r.team || [];
      renderTim();
    } catch(e) { toast('Gagal load tim: ' + e.message, 'error'); }
  }

  // ── RENDER PAKET ──
  function renderPaket() {
    const tb = document.getElementById('paket-tbody');
    tb.innerHTML = '';
    if (!pakets.length) {
      tb.innerHTML = '<tr class="empty-row"><td colspan="3">Belum ada paket. Klik "+ Tambah Paket"</td></tr>';
    } else {
      pakets.forEach(p => tb.appendChild(makeViewRow('paket', p)));
    }
    document.getElementById('paket-badge').textContent = pakets.length + ' item';
  }

  // ── RENDER ADDON ──
  function renderAddon() {
    const tb = document.getElementById('addon-tbody');
    tb.innerHTML = '';
    if (!addons.length) {
      tb.innerHTML = '<tr class="empty-row"><td colspan="3">Belum ada add on. Klik "+ Tambah Add On"</td></tr>';
    } else {
      addons.forEach(a => tb.appendChild(makeViewRow('addon', a)));
    }
    document.getElementById('addon-badge').textContent = addons.length + ' item';
  }

  // ── VIEW ROW ──
  function makeViewRow(type, item) {
    const tr = document.createElement('tr');
    tr.dataset.rowIndex = item._rowIndex;
    tr.innerHTML = `
      <td><span class="td-view">${esc(item.nama)}</span></td>
      <td><span class="td-harga-view">Rp ${fmtHarga(item.harga)}</span></td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-edit-row" title="Edit" onclick="startEdit(this, '${type}')">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-del-row" title="Hapus" onclick="doDelete(this, '${type}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </td>`;
    return tr;
  }

  // ── EDIT ROW (inline) ──
  function startEdit(btn, type) {
    const tr = btn.closest('tr');
    const rowIndex = parseInt(tr.dataset.rowIndex);
    const arr = type === 'paket' ? pakets : addons;
    const item = arr.find(x => x._rowIndex === rowIndex);
    if (!item) return;

    tr.innerHTML = `
      <td><input class="td-input" id="edit-nama-${rowIndex}" value="${esc(item.nama)}" placeholder="Nama" /></td>
      <td>
        <div class="harga-wrap">
          <span class="harga-prefix">Rp</span>
          <input class="td-input" id="edit-harga-${rowIndex}" type="number" min="0" step="1000" value="${item.harga}" placeholder="0" />
        </div>
      </td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-save-row" title="Simpan" onclick="doUpdate(this, '${type}', ${rowIndex})">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="btn-icon btn-edit-row" title="Batal" onclick="cancelEdit(this, '${type}', ${rowIndex})">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>`;
    tr.querySelector(`#edit-nama-${rowIndex}`).focus();
  }

  function cancelEdit(btn, type) {
    type === 'paket' ? renderPaket() : renderAddon();
  }

  // ── UPDATE ──
  async function doUpdate(btn, type, rowIndex) {
    const nama  = document.getElementById('edit-nama-' + rowIndex).value.trim();
    const harga = parseInt(document.getElementById('edit-harga-' + rowIndex).value) || 0;
    if (!nama) { toast('Nama tidak boleh kosong', 'error'); return; }

    load(true);
    try {
      const action = type === 'paket' ? 'updatePaket' : 'updateAddOn';
      const r = await gas(action, { rowIndex, nama, harga });
      if (r.success) {
        const arr = type === 'paket' ? pakets : addons;
        const item = arr.find(x => x._rowIndex === rowIndex);
        if (item) { item.nama = nama; item.harga = harga; }
        type === 'paket' ? renderPaket() : renderAddon();
        toast('Berhasil diupdate!', 'success');
      } else {
        toast('Gagal: ' + r.message, 'error');
      }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  // ── DELETE ──
  async function doDelete(btn, type) {
    if (!confirm('Hapus item ini?')) return;
    const tr = btn.closest('tr');
    const rowIndex = parseInt(tr.dataset.rowIndex);

    load(true);
    try {
      const action = type === 'paket' ? 'deletePaket' : 'deleteAddOn';
      const r = await gas(action, { rowIndex });
      if (r.success) {
        // Reload fresh dari sheet (rowIndex bergeser setelah delete)
        if (type === 'paket') await loadPakets();
        else await loadAddons();
        toast('Item dihapus', 'success');
      } else {
        toast('Gagal hapus: ' + r.message, 'error');
      }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  // ── ADD NEW ROW ──
  function startAddPaket() {
    const tb = document.getElementById('paket-tbody');
    // Hapus empty row jika ada
    const empty = tb.querySelector('.empty-row');
    if (empty) empty.remove();

    const tr = document.createElement('tr');
    tr.className = 'new-row';
    tr.id = 'new-paket-row';
    tr.innerHTML = `
      <td><input class="td-input" id="new-paket-nama" placeholder="Nama paket baru" /></td>
      <td>
        <div class="harga-wrap">
          <span class="harga-prefix">Rp</span>
          <input class="td-input" id="new-paket-harga" type="number" min="0" step="1000" placeholder="0" />
        </div>
      </td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-save-row" title="Simpan" onclick="doAddPaket()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="btn-icon btn-edit-row" title="Batal" onclick="renderPaket()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>`;
    tb.appendChild(tr);
    document.getElementById('new-paket-nama').focus();
  }

  async function doAddPaket() {
    const nama  = document.getElementById('new-paket-nama').value.trim();
    const harga = parseInt(document.getElementById('new-paket-harga').value) || 0;
    if (!nama) { toast('Nama paket tidak boleh kosong', 'error'); return; }

    load(true);
    try {
      const r = await gas('addPaket', { nama, harga });
      if (r.success) {
        await loadPakets();
        toast('Paket berhasil ditambahkan!', 'success');
      } else {
        toast('Gagal: ' + r.message, 'error');
      }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  function startAddAddon() {
    const tb = document.getElementById('addon-tbody');
    const empty = tb.querySelector('.empty-row');
    if (empty) empty.remove();

    const tr = document.createElement('tr');
    tr.className = 'new-row';
    tr.id = 'new-addon-row';
    tr.innerHTML = `
      <td><input class="td-input" id="new-addon-nama" placeholder="Nama add on baru" /></td>
      <td>
        <div class="harga-wrap">
          <span class="harga-prefix">Rp</span>
          <input class="td-input" id="new-addon-harga" type="number" min="0" step="1000" placeholder="0" />
        </div>
      </td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-save-row" title="Simpan" onclick="doAddAddon()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="btn-icon btn-edit-row" title="Batal" onclick="renderAddon()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>`;
    tb.appendChild(tr);
    document.getElementById('new-addon-nama').focus();
  }

  async function doAddAddon() {
    const nama  = document.getElementById('new-addon-nama').value.trim();
    const harga = parseInt(document.getElementById('new-addon-harga').value) || 0;
    if (!nama) { toast('Nama add on tidak boleh kosong', 'error'); return; }

    load(true);
    try {
      const r = await gas('addAddOn', { nama, harga });
      if (r.success) {
        await loadAddons();
        toast('Add on berhasil ditambahkan!', 'success');
      } else {
        toast('Gagal: ' + r.message, 'error');
      }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  // ── RENDER TIM ──
  const ROLES = ['MUA', 'Hair Stylist', 'Hijab Stylist'];

  function renderTim() {
    const tb = document.getElementById('tim-tbody');
    tb.innerHTML = '';
    if (!timData.length) {
      tb.innerHTML = '<tr class="empty-row"><td colspan="3">Belum ada anggota tim. Klik "+ Tambah Anggota"</td></tr>';
    } else {
      timData.forEach(t => tb.appendChild(makeTimViewRow(t)));
    }
    document.getElementById('tim-badge').textContent = timData.length + ' orang';
  }

  function makeTimViewRow(item) {
    const tr = document.createElement('tr');
    tr.dataset.rowIndex = item._rowIndex;
    tr.innerHTML = `
      <td><span class="td-view">${esc(item.nama)}</span></td>
      <td><span class="td-role-badge role-${item.role.toLowerCase().replace(/\s/g,'-')}">${esc(item.role)}</span></td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-edit-row" title="Edit" onclick="startEditTim(this)">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-del-row" title="Hapus" onclick="doDeleteTim(this)">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </td>`;
    return tr;
  }

  function roleSelectHTML(selected, idSuffix) {
    const opts = ROLES.map(r => `<option value="${r}" ${r === selected ? 'selected' : ''}>${r}</option>`).join('');
    return `<select class="td-input td-select" id="tim-role-${idSuffix}">${opts}</select>`;
  }

  function startEditTim(btn) {
    const tr = btn.closest('tr');
    const rowIndex = parseInt(tr.dataset.rowIndex);
    const item = timData.find(x => x._rowIndex === rowIndex);
    if (!item) return;

    tr.innerHTML = `
      <td><input class="td-input" id="tim-nama-${rowIndex}" value="${esc(item.nama)}" placeholder="Nama" /></td>
      <td>${roleSelectHTML(item.role, rowIndex)}</td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-save-row" title="Simpan" onclick="doUpdateTim(this, ${rowIndex})">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="btn-icon btn-edit-row" title="Batal" onclick="renderTim()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>`;
    tr.querySelector(`#tim-nama-${rowIndex}`).focus();
  }

  async function doUpdateTim(btn, rowIndex) {
    const nama = document.getElementById('tim-nama-' + rowIndex).value.trim();
    const role = document.getElementById('tim-role-' + rowIndex).value;
    if (!nama) { toast('Nama tidak boleh kosong', 'error'); return; }

    load(true);
    try {
      const r = await gas('updateTeamMember', { rowIndex, nama, role });
      if (r.success) {
        const item = timData.find(x => x._rowIndex === rowIndex);
        if (item) { item.nama = nama; item.role = role; }
        renderTim();
        toast('Anggota tim berhasil diupdate!', 'success');
      } else { toast('Gagal: ' + r.message, 'error'); }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  async function doDeleteTim(btn) {
    if (!confirm('Hapus anggota tim ini?')) return;
    const tr = btn.closest('tr');
    const rowIndex = parseInt(tr.dataset.rowIndex);

    load(true);
    try {
      const r = await gas('deleteTeamMember', { rowIndex });
      if (r.success) {
        await loadTim();
        toast('Anggota dihapus', 'success');
      } else { toast('Gagal hapus: ' + r.message, 'error'); }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  function startAddTim() {
    const tb = document.getElementById('tim-tbody');
    const empty = tb.querySelector('.empty-row');
    if (empty) empty.remove();
    if (document.getElementById('new-tim-row')) return;

    const tr = document.createElement('tr');
    tr.className = 'new-row';
    tr.id = 'new-tim-row';
    tr.innerHTML = `
      <td><input class="td-input" id="new-tim-nama" placeholder="Nama anggota" /></td>
      <td>${roleSelectHTML('MUA', 'new')}</td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-save-row" title="Simpan" onclick="doAddTim()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="btn-icon btn-edit-row" title="Batal" onclick="renderTim()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>`;
    tb.appendChild(tr);
    document.getElementById('new-tim-nama').focus();
  }

  async function doAddTim() {
    const nama = document.getElementById('new-tim-nama').value.trim();
    const role = document.getElementById('tim-role-new').value;
    if (!nama) { toast('Nama tidak boleh kosong', 'error'); return; }

    load(true);
    try {
      const r = await gas('addTeamMember', { nama, role });
      if (r.success) {
        await loadTim();
        toast('Anggota tim berhasil ditambahkan!', 'success');
      } else { toast('Gagal: ' + r.message, 'error'); }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
    load(false);
  }

  // ── GAS CALLER ──
  async function gas(action, params = {}) {
    const url = new URL(GAS);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    return res.json();
  }

  // ── HELPERS ──
  function load(v) { document.getElementById('loading').classList.toggle('show', v); }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    document.getElementById('toast-msg').textContent = msg;
    el.className = 'toast show ' + type;
    icon.innerHTML = type === 'success'
      ? '<polyline points="20 6 9 17 4 12"/>'
      : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  function fmtHarga(n) {
    return Number(n).toLocaleString('id-ID');
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
